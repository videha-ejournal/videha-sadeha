<!DOCTYPE html><html lang="mai"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>🧚 Folk Tale Scene Builder</title><style>
:root{--cream:#FAF6EE;--paper:#fffdf7;--navy:#1F2A44;--crimson:#8B1A1A;--gold:#C49A3C;--line:#D8CFC0;--ink:#23201B;--green:#2f7d4f;--blue:#2b6cb0;--soft:#F3ECDC}
*{box-sizing:border-box} body{margin:0;background:var(--cream);color:var(--ink);font-family:'Noto Serif Devanagari','Nirmala UI','Mangal',Georgia,serif;line-height:1.55}.wrap{max-width:1100px;margin:0 auto;padding:18px 18px 48px}header{background:var(--paper);border-bottom:3px double var(--gold);text-align:center;padding:22px 14px 16px}h1{margin:0;color:var(--crimson);font-size:clamp(24px,4vw,42px);font-family:Georgia,'Noto Serif Devanagari',serif}.sub{color:#5a4a3a;font-size:13px;margin-top:6px}.badge{display:inline-block;margin-top:10px;border:1px solid var(--green);color:var(--green);border-radius:22px;padding:4px 12px;background:#f1f8f2;font-size:12px}.panel{background:var(--paper);border:1px solid var(--line);border-radius:14px;padding:15px;margin:14px 0;box-shadow:0 2px 10px rgba(0,0,0,.05)}h2{font-size:1.08rem;color:var(--navy);border-left:4px solid var(--gold);padding-left:10px;margin:0 0 12px}.row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}.row>*{min-width:120px}label{font-weight:700;color:var(--navy);font-size:.9rem}input,select,textarea{font-family:inherit;font-size:15px;border:1px solid var(--line);background:#fff;border-radius:8px;padding:8px;color:var(--ink)}textarea{width:100%;min-height:90px}.btn{border:1px solid var(--crimson);background:var(--crimson);color:#fff;border-radius:22px;padding:8px 14px;font-family:inherit;font-weight:700;cursor:pointer}.btn:hover{opacity:.9}.btn.secondary{background:transparent;color:var(--crimson)}.btn.blue{background:var(--navy);border-color:var(--navy)}.btn.green{background:var(--green);border-color:var(--green)}.btn.gold{background:var(--gold);border-color:var(--gold);color:#3a2a00}.btn:disabled{opacity:.45;cursor:not-allowed}.hint{font-size:.82rem;color:#6b5a48;margin-top:6px}.status{font-size:.9rem;color:var(--navy);min-height:20px}.ok{color:var(--green);font-weight:700}.err{color:#a32020;font-weight:700}.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:9px}.card{background:#fff;border:1px solid var(--line);border-radius:12px;padding:10px;text-align:center;cursor:pointer}.card:hover{background:#fff8e8}.canvas-wrap{overflow:auto;text-align:center;background:#fff;border:1px solid var(--line);border-radius:12px;padding:10px}canvas{max-width:100%;height:auto;background:#fff;border:1px solid #eadfc9;touch-action:none}.small{font-size:.82rem;color:#5a4a3a}.pill{display:inline-block;background:var(--soft);border:1px solid var(--line);border-radius:999px;padding:4px 10px;margin:3px}.list{display:flex;flex-direction:column;gap:6px}.item{background:#fff;border:1px solid var(--line);border-radius:10px;padding:8px}.hidden{display:none}@media(max-width:650px){.row>*{min-width:100%}.grid{grid-template-columns:repeat(auto-fill,minmax(120px,1fr))}}
</style></head><body><header><h1>🧚 Folk Tale Scene Builder</h1><div class="sub">मिथिला लोककथा दृश्य बनाउ</div><div class="badge">offline · अही पन्नापर · no upload</div></header><div class="wrap"><div class="panel"><h2>लोककथा Scene</h2><div class="row"><select id="hero"><option>दादी</option><option>राजा</option><option>रानी</option><option>बालक</option><option>गोहि</option><option>पंछी</option></select><select id="place"><option>गाम</option><option>नदी किनार</option><option>जंगल</option><option>राजदरबार</option></select><button class="btn" onclick="make()">Scene बनाउ</button><button class="btn green" onclick="exportText()">Text download</button></div><textarea id="story"></textarea></div><div class="panel"><h2>Prompts</h2><div id="prompts"></div></div></div><script>let lines=[];function make(){let h=document.getElementById('hero').value,p=document.getElementById('place').value;let s=p+' मे '+h+' एकटा अद्भुत घटना देखलक। ओ सोचलक जे साहस, बुद्धि आ नेह सँ कठिनाइ दूर भऽ सकैत अछि।';lines.push(s);document.getElementById('story').value=lines.join('\n\n');document.getElementById('prompts').innerHTML=['आगू की भेल?','ककर मदति भेटल?','अंतमे सीख की भेल?'].map(x=>'<span class="pill">'+x+'</span>').join('')}function exportText(){let a=document.createElement('a');a.href=URL.createObjectURL(new Blob([document.getElementById('story').value],{type:'text/plain;charset=utf-8'}));a.download='videha-folk-tale.txt';a.click()}make();</script></body></html>
