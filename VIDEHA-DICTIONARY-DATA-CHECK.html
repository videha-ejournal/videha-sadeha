<!doctype html>
<html lang="mai"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Videha Dictionary Data Check</title>
<style>body{font-family:Georgia,'Noto Serif Devanagari',serif;background:#FAF6EE;color:#23201B;margin:0;padding:24px}.box{max-width:980px;margin:auto;background:#fff;border:1px solid #d8cfc0;padding:20px}.ok{color:#176b2c}.bad{color:#8B1A1A}.warn{color:#9a6b00}table{width:100%;border-collapse:collapse}td,th{border-bottom:1px solid #eee;padding:8px;text-align:left}.btn{background:#8B1A1A;color:white;padding:8px 12px;text-decoration:none;display:inline-block;margin:6px 0}</style></head><body><div class="box"><h1>Videha Dictionary Data Check</h1><p>ई पृष्ठ जाँचैत अछि जे split data files सही path, सही filename, आ सही JavaScript syntax सँ लोड भऽ रहल अछि कि नहि।</p><p><a class="btn" href="maithili-thesaurus.html">मैथिली थेसॉरस खोलू</a></p><div id="status">जाँच शुरू भऽ रहल अछि…</div><table><thead><tr><th>File</th><th>Status</th></tr></thead><tbody id="rows"></tbody></table><h2>Data counts</h2><pre id="counts">—</pre><h2>Expected folder</h2><pre>dictionary-data/</pre></div>
<script>
const FILES=['dictionary-data/maithili-thesaurus-data-core.js','dictionary-data/english_maithili-001.js','dictionary-data/english_maithili-002.js','dictionary-data/english_maithili-003.js','dictionary-data/english_maithili-004.js','dictionary-data/english_maithili-005.js','dictionary-data/synonyms-001.js','dictionary-data/antonyms-001.js','dictionary-data/it_glossary-001.js','dictionary-data/technical_pending-001.js','dictionary-data/maithili_english-001.js','dictionary-petar-reviewed-seed.js'];
function row(file,msg,cls){document.getElementById('rows').insertAdjacentHTML('beforeend',`<tr><td>${file}</td><td class="${cls}">${msg}</td></tr>`)}
function load(file){return new Promise(res=>{let done=false,s=document.createElement('script');let t=setTimeout(()=>finish(false,'timeout'),15000);function finish(ok,msg){if(done)return;done=true;clearTimeout(t);res({file,ok,msg})}s.src=file+'?v=20260624fixed2';s.onload=()=>finish(true,'loaded');s.onerror=()=>finish(false,'not found or blocked');document.head.appendChild(s);});}
(async()=>{document.getElementById('status').textContent='Loading '+FILES.length+' files…';let ok=0;for(const f of FILES){let r=await load(f);row(f,r.ok?'✅ '+r.msg:'❌ '+r.msg,r.ok?'ok':'bad');if(r.ok)ok++;}
let D=window.VIDEHA_THESAURUS_DATA||{};let counts={};for(const k of ['english_maithili','maithili_english','technical_pending','it_glossary','synonyms','antonyms']) counts[k]=Array.isArray(D[k])?D[k].length:0;counts.pdf_reviewed=Array.isArray(window.VIDEHA_PETAR_REVIEWED_ENTRIES)?window.VIDEHA_PETAR_REVIEWED_ENTRIES.length:0;document.getElementById('counts').textContent=JSON.stringify(counts,null,2);let total=counts.english_maithili+counts.maithili_english+counts.technical_pending+counts.it_glossary+counts.synonyms+counts.antonyms;document.getElementById('status').innerHTML= total>0?'<b class="ok">✅ Data loaded. Total rows: '+total.toLocaleString('en-IN')+'</b>':'<b class="bad">❌ Files may exist, but data arrays did not initialize. Re-upload this fixed ZIP exactly.</b>';})();
</script></body></html>
