<!doctype html><html lang="mai"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Videha Dictionary Data Check</title><link rel="stylesheet" href="assets/css/videha.css"><style>body{font-family:'Noto Serif Devanagari',serif;background:#EFE9DC}.page{max-width:960px;margin:30px auto;background:#FAF6EE;border:1px solid #D8CFC0;padding:24px}.ok{color:#166534}.bad{color:#8B1A1A}.row{padding:8px;border-bottom:1px solid #D8CFC0}.btn{border:1px solid #8B1A1A;color:#8B1A1A;background:#fff;padding:8px 12px;cursor:pointer}</style></head><body><main class="page"><h1>Videha Dictionary Data Check</h1><p>ई पन्ना GitHub Pages पर uploaded split dictionary data files जाँचैत अछि।</p><button class="btn" onclick="check()">Check data files</button><div id="out"></div></main><script>
const BASE='https://videha-ejournal.github.io/videha-sadeha/';
const files=['dictionary-data/maithili-thesaurus-data-core.js','dictionary-data/english_maithili-001.js','dictionary-data/english_maithili-002.js','dictionary-data/english_maithili-003.js','dictionary-data/english_maithili-004.js','dictionary-data/english_maithili-005.js','dictionary-data/synonyms-001.js','dictionary-data/antonyms-001.js','dictionary-data/it_glossary-001.js','dictionary-data/technical_pending-001.js','dictionary-data/maithili_english-001.js','dictionary-petar-reviewed-seed.js'];
async function check(){let out=document.getElementById('out');out.innerHTML='<p>Checking…</p>';let html='';for(const f of files){try{let r=await fetch(BASE+f+'?v='+Date.now(),{cache:'no-store'});let len=r.headers.get('content-length')||'';html+=`<div class="row ${r.ok?'ok':'bad'}">${r.ok?'✅':'❌'} ${f} — HTTP ${r.status} ${len?(' — '+len+' bytes'):''}</div>`}catch(e){html+=`<div class="row bad">❌ ${f} — ${e.message}</div>`}}out.innerHTML=html}window.addEventListener('DOMContentLoaded',check);</script></body></html>
