<!doctype html><html lang="mai"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Videha Panji Mūla–Gotra–Mūlagrāma Index</title><link rel="stylesheet" href="assets/css/videha.css"><style>:root{--ink:#1b2430;--muted:#5b6472;--line:#d9dee7;--bg:#f7f7f4;--card:#fff;--accent:#7a1f1f;--gold:#b9822b}*{box-sizing:border-box}body{margin:0;font:16px/1.5 system-ui,-apple-system,Segoe UI,Roboto,Noto Sans Devanagari,Noto Serif Devanagari,Arial,sans-serif;background:var(--bg);color:var(--ink)}.vh-top{background:#fffdf7;border-bottom:4px solid var(--accent);padding:20px}.wrap{max-width:1220px;margin:auto;padding:18px}.vh-nav{display:flex;flex-wrap:wrap;gap:10px;margin-top:12px}.vh-nav a,.btn{display:inline-block;border:1px solid var(--line);border-radius:999px;padding:8px 12px;text-decoration:none;color:#7a1f1f;background:#fff}.btn-gold{background:#fff7df;border-color:#d6b16b}.panel,.card{background:#fff;border:1px solid var(--line);border-radius:14px;padding:16px;box-shadow:0 1px 4px rgba(0,0,0,.04);margin:14px 0}.grid{display:grid;grid-template-columns:1.2fr .8fr .8fr .8fr;gap:10px}@media(max-width:850px){.grid{grid-template-columns:1fr}}label{font-size:12px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);display:block;margin-bottom:4px}input,select,button{width:100%;padding:11px 12px;border:1px solid var(--line);border-radius:9px;font-size:15px;background:#fff}button{background:var(--accent);color:#fff;border-color:var(--accent);cursor:pointer}.secondary{background:#fff!important;color:var(--accent)!important}.stats{display:flex;gap:10px;flex-wrap:wrap}.pill{border:1px solid var(--line);background:#fff;border-radius:99px;padding:7px 10px;font-size:13px}.result{padding:13px 0;border-top:1px solid var(--line)}.meta{font-size:13px;color:var(--muted);margin-bottom:5px}.orig{font-family:Noto Serif Devanagari,Noto Sans Devanagari,serif;font-size:18px}.iast{color:#293b5f;margin-top:3px}.mool{font-size:13px;color:#6d4812;margin-top:4px}.small{font-size:13px;color:var(--muted)}details summary{cursor:pointer;color:var(--accent);font-weight:700}.tag{display:inline-block;border:1px solid #ead7b5;background:#fff8e8;border-radius:6px;padding:2px 5px;margin:2px;font-size:12px}.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:14px}</style></head><body><header class="vh-top"><div class="wrap"><h1>पञ्जी मूल–गोत्र–मूलग्राम इंडेक्स</h1><p class="small">loads panji_mool_mulagram_catalog.json</p><nav class="vh-nav"><a href="https://www.videha.co.in/index.htm">विदेह नूतन अंक</a><a href="https://www.videha.co.in/videha.htm">विदेहक पुरान अंक</a><a href="https://www.videha.co.in/pothi.htm">विदेह पोथी</a><a href="https://www.videha.co.in/videha-elearning.htm">विदेह ई-लर्निङ्ग</a><a href="https://www.videha.co.in/archive.htm">पेटार / Archive</a></nav></div></header><main class="wrap"><section class="panel"><div class="stats" id="stats"><span class="pill">Loading catalog…</span></div></section><section class="panel"><div class="grid" style="grid-template-columns:1.4fr .6fr .6fr .6fr"><div><label>Search mūla / mūlagrāma / gotra</label><input id="q" placeholder="दरिहरा, Darihara, खौआल"></div><div><label>Minimum count</label><input id="minc" type="number" min="1" value="1"></div><div><label>Sort</label><select id="sort"><option value="count">Count</option><option value="dev">Devanagari</option><option value="roman">Roman</option></select></div><div><label>&nbsp;</label><button onclick="run()">Search</button></div></div><p class="small">Broad catalog from Panji marker सँ / सॅ, headings, Volume II and FAQ/data tables.</p></section><section class="panel"><div id="count" class="small"></div><div id="results" class="cards"></div></section></main><footer class="wrap small">© Gajendra Thakur / Videha · <a href="https://www.videha.co.in/pothi.htm">Videha Pothi</a></footer><script>let C=[];function norm(s){return(s||'').toString().normalize('NFD').replace(/[̀-ͯ]/g,'').toLowerCase().replace(/[^\p{Letter}\p{Number}]+/gu,' ').trim()}function esc(s){return(s||'').toString().replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}async function init(){try{C=await fetch('panji_mool_mulagram_catalog.json').then(r=>r.json())}catch(e){document.getElementById('stats').innerHTML='<span class="pill">Could not load panji_mool_mulagram_catalog.json</span>';return}document.getElementById('stats').innerHTML='<span class="pill">Mūla/Mūlagrāma candidates: '+C.length.toLocaleString()+'</span><span class="pill">Volume II + reference tables included</span>';run()}function run(){let q=document.getElementById('q').value,min=parseInt(document.getElementById('minc').value||'1',10),sort=document.getElementById('sort').value;let res=C.filter(x=>(x.count||0)>=min&&(!q||norm([x.dev,x.iast,x.roman,x.gotra_context,x.top_sources].join(' ')).includes(norm(q))));if(sort==='count')res.sort((a,b)=>(b.count||0)-(a.count||0));else res.sort((a,b)=>String(a[sort]||'').localeCompare(String(b[sort]||''),'hi'));document.getElementById('count').textContent=res.length.toLocaleString()+' entries; displaying first 400.';document.getElementById('results').innerHTML=res.slice(0,400).map(x=>'<div class="card"><h3 style="margin:.1rem 0">'+esc(x.dev)+'</h3><div class="iast">'+esc(x.iast)+'</div><p class="small"><b>Count:</b> '+esc(x.count)+'<br><b>Sources:</b> '+esc(x.top_sources||'')+'<br><b>Gotra context:</b> '+esc(x.gotra_context||'')+'</p></div>').join('')||'<p>No matches.</p>'}init();</script></body></html>
